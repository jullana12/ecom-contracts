const ord = n => n+(n===1?"st":n===2?"nd":n===3?"rd":"th");
let activeTab="all", sortByDue=false;

function getCat(key){ return CATS.find(c=>c.key===key); }

function getFiltered(){
  const q=document.getElementById("search").value.toLowerCase();
  let list=clients.filter(c=>
    (activeTab==="all"||c.cat===activeTab)&&
    (!q||c.name.toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q))
  );
  if(sortByDue) list=[...list].sort((a,b)=>(a.due||99)-(b.due||99));
  return list;
}

  const miss=!c.email||!c.due||!c.pay;
  const tierBadges=c.tiers.map(([r,p])=>`<span class="tier-badge" style="background:${col.header};border-color:${col.border};color:${col.text}">${r} ‚Üí ${p}</span>`).join("");
  return `<div class="client-card" style="border-left-color:${col.border}">
    <div class="client-name">
      ${c.name}
      ${showBadge?`<span class="badge" style="background:${col.bg};border-color:${col.border};color:${col.text}">${col.label}</span>`:""}
      ${miss?`<span class="badge badge-warn">‚ö†ÔłŹ incomplete</span>`:""}
    </div>
    <div class="meta">
      ${c.email?`<span>‚úČÔłŹ ${c.email}</span>`:`<span class="meta-missing">‚úČÔłŹ missing</span>`}
      ${c.due?`<span>ūüďÖ Due: ${ord(c.due)}</span>`:`<span class="meta-missing">ūüďÖ missing</span>`}
      ${c.pay?`<span>ūüí≥ ${c.pay}</span>`:`<span class="meta-missing">ūüí≥ missing</span>`}
    </div>
    ${c.retainer?`<div class="retainer-line"><strong style="color:${col.text}">Retainer:</strong> ${c.retainer}</div>`:""}
    ${c.tiers.length?`<div class="tiers">${tierBadges}</div>`:""}
    ${c.min?`<div class="notes">Min: ${c.min}</div>`:""}
    ${c.notes?`<div class="notes">${c.notes}</div>`:""}
  </div>`;
}

function render(){
  const filtered=getFiltered();
  document.getElementById("subtitle").textContent=`${clients.length} contracts ¬∑ 7 fee structure categories`;

  // Warning
  const missing=clients.filter(c=>!c.email||!c.due||!c.pay).map(c=>c.name);
  const warnEl=document.getElementById("warning");
  if(missing.length){warnEl.style.display="";warnEl.innerHTML=`<strong>‚ö†ÔłŹ Missing payment info:</strong> ${missing.join(" ¬∑ ")}`;}
  else warnEl.style.display="none";

  // Sort button
  const btn=document.getElementById("sortBtn");
  btn.style.border=`1.5px solid ${sortByDue?"#3b82f6":"#d1d5db"}`;
  btn.style.background=sortByDue?"#eff6ff":"#fff";
  btn.style.color=sortByDue?"#1d4ed8":"#6b7280";
  btn.textContent=sortByDue?"ūüďÖ Sorted by Due Date":"ūüďÖ Sort by Due Date";

  // Tabs
  const tabsEl=document.getElementById("tabs");
  if(sortByDue){tabsEl.style.display="none";}
  else{
    tabsEl.style.display="flex";
    const counts={all:clients.length};
    CATS.forEach(cat=>{counts[cat.key]=clients.filter(c=>c.cat===cat.key).length;});
    tabsEl.innerHTML=`<button class="tab" onclick="setTab('all')" style="border-color:${activeTab==="all"?"#111":"#e5e7eb"};background:${activeTab==="all"?"#111":"#fff"};color:${activeTab==="all"?"#fff":"#6b7280"}">All (${counts.all})</button>`+
      CATS.map(cat=>`<button class="tab" onclick="setTab('${cat.key}')" style="border-color:${activeTab===cat.key?cat.border:"#e5e7eb"};background:${activeTab===cat.key?cat.bg:"#fff"};color:${activeTab===cat.key?cat.text:"#6b7280"}">${cat.label} (${counts[cat.key]})</button>`).join("");
  }

  // Content
  const contentEl=document.getElementById("content");
  if(sortByDue){
    contentEl.innerHTML=`<div class="sorted-wrap"><div class="sorted-header">ūüďÖ All Clients ‚ÄĒ sorted by due date (${filtered.length})</div>${filtered.map(c=>cardHTML(c,true)).join("")}</div>`;
  } else {
    const grouped={};
    filtered.forEach(c=>{if(!grouped[c.cat])grouped[c.cat]=[];grouped[c.cat].push(c);});
    const visCats=activeTab==="all"?CATS.filter(cat=>grouped[cat.key]?.length):CATS.filter(cat=>cat.key===activeTab);
    if(!filtered.length){contentEl.innerHTML=`<div class="empty">No clients match your search.</div>`;return;}
    contentEl.innerHTML=visCats.map(cat=>{
      const cc=grouped[cat.key]||[];if(!cc.length)return"";
      return `<div class="category-wrap" style="border:1px solid ${cat.border}">
        <div class="category-header" style="background:${cat.header};color:${cat.text}">${cat.label} ‚ÄĒ ${cc.length} client${cc.length!==1?"s":""}</div>
        ${cc.map(c=>cardHTML(c,false)).join("")}
      </div>`;
    }).join("");
  }
}

function setTab(key){activeTab=key;render();}
function toggleSort(){sortByDue=!sortByDue;render();}

render();
</script>
</body>
</html>

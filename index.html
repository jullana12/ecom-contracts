<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Extension eCom — Client Contracts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f8fa;color:#1a1a1a;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:24px 20px}
h1{font-size:18px;font-weight:600;margin-bottom:2px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:16px}
.warn-banner{font-size:12px;background:#fef9c3;border:1px solid #fde047;color:#854d0e;border-radius:8px;padding:7px 12px;margin-bottom:14px}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.inp{position:relative;flex:2;min-width:150px}
.inp-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:#9ca3af}
.inp input,.due-inp input{width:100%;padding:7px 12px 7px 30px;border-radius:8px;border:1px solid #e5e7eb;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.inp input:focus,.due-inp input:focus{border-color:#a5b4fc}
.due-inp{position:relative;flex:1;min-width:140px}
.due-inp input{border:1px solid #e5e7eb}
.due-inp input.active{border-color:#22c55e;background:#f0fdf4}
.due-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#9ca3af;line-height:1}
.sort-btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#6b7280;white-space:nowrap;transition:all .15s}
.sort-btn.active{border-color:#22c55e;background:#f0fdf4;color:#15803d;font-weight:500}
.due-banner{font-size:12px;color:#15803d;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:6px 12px;margin-bottom:12px}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tab{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#6b7280;transition:all .15s}
.tab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab .cnt{opacity:.6}
.section{margin-bottom:16px;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;background:#fff}
.sec-header{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid #e5e7eb;background:#f9fafb}
.sec-header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-header .sec-label{font-size:13px;font-weight:500}
.sec-header .sec-count{margin-left:auto;font-size:12px;color:#6b7280;background:#f3f4f6;border-radius:10px;padding:1px 8px}
.row{border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s}
.row:last-child{border-bottom:none}
.row:hover .row-main{background:#f9fafb}
.row-main{display:flex;align-items:center;gap:12px;padding:10px 16px;transition:background .1s}
.row-main.open{background:#f9fafb}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:500;color:#111;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge-warn{font-size:10px;background:#fef9c3;border:1px solid #fde047;color:#854d0e;border-radius:4px;padding:1px 6px;font-weight:500}
.row-email{font-size:12px;color:#6b7280;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.due-pill{font-size:12px;font-weight:500;border-radius:6px;padding:3px 8px;flex-shrink:0}
.pay-badge{font-size:11px;color:#6b7280;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:4px;padding:2px 6px;flex-shrink:0;width:54px;text-align:center}
.chevron{font-size:11px;color:#9ca3af;flex-shrink:0;transition:transform .15s;display:inline-block}
.chevron.open{transform:rotate(90deg)}
.row-detail{padding:12px 16px 16px 60px;background:#f9fafb;border-top:1px solid #f3f4f6}
.detail-label{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-value{font-size:13px;font-weight:500;color:#111;margin-bottom:10px}
.tiers{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;margin-bottom:10px}
.tier-chip{font-size:12px;font-weight:500;border-radius:6px;padding:4px 10px;border:1px solid}
.detail-note{font-size:12px;color:#6b7280;font-style:italic;margin-top:4px}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
.sorted-header{padding:10px 16px;border-bottom:1px solid #e5e7eb;background:#f9fafb;font-size:13px;font-weight:500;color:#374151}
@media(max-width:560px){.controls{flex-direction:column}.inp,.due-inp{flex:none;width:100%}.sort-btn{width:100%}}
</style>
</head>

</div>

  {cat:"retainer",name:"Cannadips",email:"ap@swisher.com",due:30,pay:"ACH",retainer:"$1,550/mo",min:null,notes:"Quarterly invoice",tiers:[]},
  {cat:"retainer",name:"Badass Moto",email:"gomezfit@gmail.com",due:28,pay:"Stripe",retainer:"$1,499/mo",min:null,notes:"",tiers:[]},
  {cat:"retainer",name:"Farm to Pet",email:"jackson@farmtopettreats.com",due:30,pay:"ACH",retainer:"$2,200/mo",min:null,notes:"",tiers:[]},
  {cat:"angelcare",name:"Angelcare (CA)",email:"payables@angelcaregroup.com",due:1,pay:"ACH",retainer:null,min:null,notes:"PPC: $5,999/mo · Catalog: $749/mo · SEO: $1,125/qtr · Total ~$87,226/yr",tiers:[]},
  {cat:"angelcare",name:"Angelcare (MX/Brazil)",email:"payables@angelcaregroup.com",due:1,pay:"ACH",retainer:null,min:null,notes:"PPC: $3,759/mo · Catalog: $240/mo · SEO: $1,125/qtr",tiers:[]},
];

const ord=n=>n+(n===1?"st":n===2?"nd":n===3?"rd":"th");
const initials=n=>n.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
const getCat=k=>CATS.find(c=>c.key===k);

let activeTab="all", sortByDue=false, expanded={};

function getFiltered(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  const dv=document.getElementById("dueFilter").value;
  const dueNum=dv!==""?parseInt(dv):null;
  let list=DATA.filter(c=>
    (activeTab==="all"||c.cat===activeTab)&&
    (!q||c.name.toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q))&&
    (dueNum===null||c.due===dueNum)
  );
  if(sortByDue) list=[...list].sort((a,b)=>(a.due||99)-(b.due||99));
  return list;
}

function rowHTML(c,showCatBadge){
  const cat=getCat(c.cat);
  const miss=!c.email||!c.due||!c.pay;
  const av=initials(c.name);
  const isOpen=!!expanded[c.name];
  const catBadge=showCatBadge?`<span style="font-size:10px;background:${cat.pill};border:1px solid ${cat.border};color:${cat.text};border-radius:4px;padding:1px 6px;font-weight:500">${cat.label}</span>`:"";
  const missBadge=miss?`<span class="badge-warn">incomplete</span>`:"";
  const duePill=c.due
    ?`<span class="due-pill" style="background:${cat.pill};color:${cat.text}">Due ${ord(c.due)}</span>`
    :`<span style="font-size:12px;color:#f59e0b">no date</span>`;
  const tierChips=c.tiers.map(([r,p])=>`<span class="tier-chip" style="background:${cat.pill};border-color:${cat.border};color:${cat.text}">${r} → ${p}</span>`).join("");
  const detail=isOpen?`
    <div class="row-detail">
      ${c.retainer?`<div class="detail-label">Retainer</div><div class="detail-value">${c.retainer}</div>`:""}
      ${c.tiers.length?`<div class="detail-label">Bonus tiers</div><div class="tiers">${tierChips}</div>`:""}
      ${c.min?`<div class="detail-note">Min: ${c.min}</div>`:""}
      ${c.notes?`<div class="detail-note">${c.notes}</div>`:""}
    </div>`:"";
  return `<div class="row" onclick="toggleRow('${c.name.replace(/'/g,"\\'")}')">
    <div class="row-main${isOpen?" open":""}">
      <div class="avatar" style="background:${cat.pill};color:${cat.text}">${av}</div>
      <div class="row-info">
        <div class="row-name">${c.name} ${catBadge}${missBadge}</div>
        <div class="row-email">${c.email||'<span style="color:#f59e0b">no email</span>'}</div>
      </div>
      ${duePill}
      <div class="pay-badge">${c.pay||"—"}</div>
      <span class="chevron${isOpen?" open":""}">▶</span>
    </div>
    ${detail}
  </div>`;
}

function sectionHTML(cat,items){
  return `<div class="section">
    <div class="sec-header">
      <div class="dot" style="background:${cat.dot}"></div>
      <span class="sec-label">${cat.label}</span>
      <span class="sec-count">${items.length}</span>
    </div>
    ${items.map(c=>rowHTML(c,false)).join("")}
  </div>`;
}

function render(){
  const filtered=getFiltered();
  const dv=document.getElementById("dueFilter").value;
  const dueNum=dv!==""?parseInt(dv):null;

  document.getElementById("subtitle").textContent=`${DATA.length} clients · ${CATS.length} fee structures`;

  const missing=DATA.filter(c=>!c.email||!c.due||!c.pay).map(c=>c.name);
  const wb=document.getElementById("warnBanner");
  if(missing.length){wb.style.display="";wb.innerHTML=`<strong>⚠️ Missing info:</strong> ${missing.join(" · ")}`;}
  else wb.style.display="none";

  const dc=document.getElementById("dueClear");
  const di=document.getElementById("dueFilter");
  dc.style.display=dv?"":"none";
  di.classList.toggle("active",!!dv);

  const db=document.getElementById("dueBanner");
  if(dueNum){db.style.display="";db.textContent=`Showing ${filtered.length} client${filtered.length!==1?"s":""} due on the ${ord(dueNum)}`;}
  else db.style.display="none";

  const sb=document.getElementById("sortBtn");
  sb.className="sort-btn"+(sortByDue?" active":"");
  sb.textContent=sortByDue?"↑ By due date":"↕ Sort by date";

  // Tabs
  const counts={all:DATA.length};
  CATS.forEach(c=>{counts[c.key]=DATA.filter(x=>x.cat===c.key).length;});
  const allTab={key:"all",label:"All",dot:"#6b7280",pill:"#f3f4f6",border:"#e5e7eb",text:"#374151"};
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=[allTab,...CATS].map(cat=>{
    const active=activeTab===cat.key;
    return `<button class="tab" onclick="setTab('${cat.key}')" style="border-color:${active?cat.border:"#e5e7eb"};background:${active?cat.pill:"#fff"};color:${active?cat.text:"#6b7280"};font-weight:${active?500:400}">
      <div class="dot" style="background:${cat.dot}"></div>
      ${cat.label}<span class="cnt">(${counts[cat.key]||0})</span>
    </button>`;
  }).join("");

  // Content
  const contentEl=document.getElementById("content");
  if(!filtered.length){contentEl.innerHTML=`<div class="empty">No clients match your filters.</div>`;return;}

  if(sortByDue){
    contentEl.innerHTML=`<div class="section">
      <div class="sec-header"><span class="sec-label">All clients — sorted by due date</span><span class="sec-count">${filtered.length}</span></div>
      ${filtered.map(c=>rowHTML(c,true)).join("")}
    </div>`;
    return;
  }

  const grouped={};
  filtered.forEach(c=>{if(!grouped[c.cat])grouped[c.cat]=[];grouped[c.cat].push(c);});
  const visCats=activeTab==="all"?CATS.filter(cat=>grouped[cat.key]?.length):CATS.filter(cat=>cat.key===activeTab&&grouped[cat.key]?.length);
  contentEl.innerHTML=visCats.map(cat=>sectionHTML(cat,grouped[cat.key])).join("");
}

function toggleRow(name){
  expanded[name]=!expanded[name];
  render();
}
function setTab(key){activeTab=key;render();}
function toggleSort(){sortByDue=!sortByDue;render();}
function clearDue(){document.getElementById("dueFilter").value="";render();}

render();
</script>
</body>
</html>
